name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — frontend & backend
        run: npm run type-check

      - name: ESLint
        run: npm run lint -- --max-warnings 0

      - name: Build (Vite)
        run: npm run build

      - name: Tests (Vitest)
        run: npm test

services:
  - type: web
    name: urbanflow-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build:server
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://urbanflow-nu.vercel.app
      - key: TRANSPORT_PROVIDER
        value: demo
      - key: DEMO_MODE
        value: "false"

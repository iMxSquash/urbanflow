services:
  - type: web
    name: urbanflow-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build:server
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXTERNAL_DATABASE_URL
        fromDatabase:
          name: urbanflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://REMPLACER_PAR_URL_VERCEL.vercel.app
      - key: TRANSPORT_PROVIDER
        value: demo
      - key: DEMO_MODE
        value: "false"

databases:
  - name: urbanflow-db
    plan: free
    region: frankfurt
    databaseName: urbanflow
    user: urbanflow_user
    postgresMajorVersion: 16

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: urbanflow
      POSTGRES_PASSWORD: urbanflow
      POSTGRES_DB: urbanflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
